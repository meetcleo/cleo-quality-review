name: Tests

"on": push

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build gem
        run: bundle exec gem build cleo_quality_review.gemspec

      - name: Run tests
        run: bundle exec rake test
